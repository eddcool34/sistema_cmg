<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>App</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        input[type="text"], input[type="password"] { padding: 10px; margin: 10px 0; width: 100%; }\n        button { padding: 10px; }\n    </style>\n</head>\n<body>\n    <h1>Login</h1>\n    <form id="loginForm">\n        <input type="text" id="username" placeholder="Username" required>\n        <input type="password" id="password" placeholder="Password" required>\n        <button type="submit">Login</button>\n    </form>\n    <div id="salesManagement" style="display: none;">\n        <h2>Sales Management</h2>\n        <h3>Add Sale</h3>\n        <input type="text" id="saleDescription" placeholder="Description">\n        <input type="number" id="saleAmount" placeholder="Amount">\n        <button id="addSaleButton">Add Sale</button>\n        <h3>Sales List</h3>\n        <ul id="salesList"></ul>\n    </div>\n    <script>\n        const loginForm = document.getElementById('loginForm');\n        const salesManagement = document.getElementById('salesManagement');\n        const salesList = document.getElementById('salesList');\n        const sales = JSON.parse(localStorage.getItem('sales')) || [];\n        sales.forEach(sale => {\n            const li = document.createElement('li');\n            li.textContent = `${sale.description}: $${sale.amount}`;\n            salesList.appendChild(li);\n        });\n        loginForm.addEventListener('submit', (event) => {\n            event.preventDefault();\n            salesManagement.style.display = 'block';\n        });\n        document.getElementById('addSaleButton').addEventListener('click', () => {\n            const description = document.getElementById('saleDescription').value;\n            const amount = document.getElementById('saleAmount').value;\n            const newSale = { description, amount };\n            sales.push(newSale);\n            localStorage.setItem('sales', JSON.stringify(sales));\n            const li = document.createElement('li');\n            li.textContent = `${description}: $${amount}`;\n            salesList.appendChild(li);\n            document.getElementById('saleDescription').value = '';\n            document.getElementById('saleAmount').value = '';\n        });\n    <\/script>\n</body>\n</html>
